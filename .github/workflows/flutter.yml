name: Build CODE30 APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Expo prebuild (generate Android project)
        run: npx expo prebuild --platform android --clean
        env:
          CI: 1

      - name: Configure release build to use debug signing (for sideloading)
        run: |
          python3 - << 'PYEOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          # Replace release signingConfig to use debug (always available, no keystore needed)
          content = re.sub(
              r'signingConfig\s+signingConfigs\.release',
              'signingConfig signingConfigs.debug',
              content
          )

          # If there's no signingConfig in release block at all, inject it
          if 'signingConfigs.debug' not in content:
              content = content.replace(
                  'release {',
                  'release {\n            signingConfig signingConfigs.debug',
                  1
              )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("Signing config updated to use debug keystore")
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK (JS bundled, debug-signed)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: Verify APK
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          if [ -f "$APK" ]; then
            echo "✅ APK siap!"
            echo "Saiz: $(du -sh $APK | cut -f1)"
          else
            echo "❌ APK tidak dijumpai"
            find android/app/build/outputs -name "*.apk" 2>/dev/null || true
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CODE30-v1.2.0-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
